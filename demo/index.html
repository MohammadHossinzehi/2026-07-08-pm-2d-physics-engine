<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>2D Physics Engine Demo</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    background: #12141c;
    color: #e6e6e6;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 14px;
    opacity: 0.85;
    line-height: 1.5;
  }
  canvas {
    display: block;
    background: #1b1e29;
  }
</style>
</head>
<body>
<div id="ui">
  Click: drop a box &nbsp;|&nbsp; Shift+Click: drop a circle &nbsp;|&nbsp; R: reset
</div>
<canvas id="canvas" width="900" height="600"></canvas>
<script type="module" src="./demo.js"></script>
</body>
</html>
